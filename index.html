<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyon Tourist Page</title>
    <style>
        * {
            font: 1.2rem/1.5 sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            background-color: rgba(151, 149, 149, 0.6);
            position: sticky;
            top: 0px;
            backdrop-filter: blur(3px);
        }
        h1 {
            text-transform: uppercase;
        }
        nav a {
            text-decoration: none;
            padding: 20px;
            margin-left: 40px;
        }

        /* hero secttion */
        .hero {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-image: url('/images/cover.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero button {
            padding: 20px 30px;
            border-radius: 10px;
        }
        /* map */
        .map {
            height: 100vh;
            width: 100vw;
        }
        h2 {
            font-size: 2rem;
            text-align: center;
            padding: 40px;
        }
        .map .back {
            height: 70vh;
            width: 100vw;
            background-image: url(./images/lyon-map.jpg);
            background-size: fit;
            margin: auto;
            display: flex;
            gap: 10px;
        }
        .back .cards {
            margin: auto;
            width: 50%;
            padding: 10px;
            display: grid;
            gap: 10px;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: min-content min-content;
        }
        .cards div {
            padding: 5px;
        }
        .cards figcaption {
            font-size: .8rem;
        }
        .back .blank {
            width: 50%;
        }
        .back .cards div {
            border: 1px solid;
            background-color: white;
        }

        /* video */
        .vid, video {
            width: 100vw;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome Lyon</h1>
        <nav>
            <a href="#">Link</a>
            <a href="#">Link</a>
            <a href="#">Link</a>
        </nav>
    </header>
    <main>
        <div class="hero">
            <!-- <img src="/images/cover.jpg" alt="hero image"> -->
             <button>Call To Action</button>
        </div>
        <div class="map">
            <h2>Map Attractions</h2>
            <div class="back">
                <div class="cards">
                    <div>
                        <figure>
                            <img 
                                src="/images/attraction-a.jpg" 
                                alt="attraction image a"
                                style="width: 100%;"
                            >
                            <figcaption>Park de la Tete</figcaption>
                        </figure>
                    </div>
                    <div>
                        <figure>
                            <img 
                                src="/images/attraction-a.jpg" 
                                alt="attraction image a"
                                style="width: 100%;"
                            >
                            <figcaption>Park de la Tete</figcaption>
                        </figure>
                    </div>
                    <div>
                        <figure>
                            <img 
                                src="/images/attraction-a.jpg" 
                                alt="attraction image a"
                                style="width: 100%;"
                            >
                            <figcaption>Park de la Tete</figcaption>
                        </figure>
                    </div>
                    <div>
                        <figure>
                            <img 
                                src="/images/attraction-a.jpg" 
                                alt="attraction image a"
                                style="width: 100%;"
                            >
                            <figcaption>Park de la Tete</figcaption>
                        </figure>
                    </div>
                </div>
                <div class="blank"></div>
            </div>
        </div>
        <div class="vid">
            <video autoplay loop>
                <source src="/video/lyon.mp4" type="video/mp4" />
                <p>
                    Your browser doesn't support HTML video. Here is a
                    <a href="myVideo.mp4" download="myVideo.mp4">link to the video</a> instead.
                </p>
            </video>
        </div>
    </main>
</body>
</html>
